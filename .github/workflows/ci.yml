name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: -C link-arg=-fuse-ld=mold
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Verify version sync targets
        run: |
          VERSION=$(python3 - <<'PY'
          import tomllib
          from pathlib import Path

          with Path('.cz.toml').open('rb') as fp:
              print(tomllib.load(fp)['tool']['commitizen']['version'])
          PY
          )
          python3 scripts/sync-version.py "$VERSION"
          git diff --exit-code

      - name: Check Conventional Commits
        if: github.event_name == 'pull_request'
        run: |
          python3 -m pip install commitizen
          cz check --rev-range "${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y mold libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Create frontend stub for Tauri build
        run: mkdir -p ui/dist && touch ui/dist/index.html

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build
        run: cargo build --workspace

      - name: Test
        run: cargo test --workspace

      - name: Security audit
        run: |
          cargo install cargo-audit --quiet
          cargo audit

  # NOTE: macOS integration tests are disabled because GitHub Actions macOS
  # runners do not ship with Docker. The Colima-based workaround is slow and
  # flaky (~3-5 min startup, frequent timeouts). Re-enable when GitHub offers
  # native Docker support on macOS runners, or when a faster alternative
  # (e.g., OrbStack in CI) becomes viable.
  #
  # The APFS clone storage backend is still tested manually on macOS.
  # The macOS release binary is built without integration tests (see release job).
  integration-macos:
    name: Integration (macOS / APFS)
    needs: build-and-test
    if: ${{ false }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build

      - name: Set up Docker
        run: |
          brew install docker colima
          colima start
          # Wait for Docker to be ready
          for i in $(seq 1 30); do
            if docker info &>/dev/null 2>&1; then
              echo "Docker is ready"
              break
            fi
            sleep 2
          done
          docker version

      - name: Pull postgres image
        run: docker pull postgres:17

      - name: Run integration tests
        env:
          EXPECTED_STORAGE: apfs_clone
          DEVFLOW_BIN: ${{ github.workspace }}/target/debug/devflow
        run: ./scripts/integration-test.sh

  integration-linux-zfs:
    name: Integration (Linux / ZFS)
    needs: build-and-test
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: -C link-arg=-fuse-ld=mold
    steps:
      - uses: actions/checkout@v4

      - name: Install mold linker
        run: sudo apt-get install -y mold

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build

      - name: Install ZFS
        run: |
          sudo apt-get update
          sudo apt-get install -y zfsutils-linux
          sudo modprobe zfs

      - name: Set up ZFS pool
        run: $GITHUB_WORKSPACE/target/debug/devflow setup-zfs --pool-name devflow --size 2G

      - name: Redirect devflow data to ZFS
        run: |
          mkdir -p ~/.local/share
          rm -rf ~/.local/share/devflow
          ln -s /var/lib/devflow/data ~/.local/share/devflow

      - name: Pull postgres image
        run: docker pull postgres:17

      - name: Run integration tests
        env:
          EXPECTED_STORAGE: zfs
          DEVFLOW_ZFS_DATASET: devflow
        run: |
          RUNNER_HOME="$HOME"
          sudo \
            HOME="$RUNNER_HOME" \
            XDG_DATA_HOME="$RUNNER_HOME/.local/share" \
            EXPECTED_STORAGE="$EXPECTED_STORAGE" \
            DEVFLOW_ZFS_DATASET="$DEVFLOW_ZFS_DATASET" \
            DEVFLOW_BIN="$GITHUB_WORKSPACE/target/debug/devflow" \
            bash ./scripts/integration-test.sh

  integration-linux-xfs:
    name: Integration (Linux / XFS reflink)
    needs: build-and-test
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: -C link-arg=-fuse-ld=mold
    steps:
      - uses: actions/checkout@v4

      - name: Install mold linker
        run: sudo apt-get install -y mold

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build

      - name: Set up XFS with reflink
        run: |
          sudo apt-get update
          sudo apt-get install -y xfsprogs
          sudo truncate -s 2G /tmp/xfs.img
          sudo mkfs.xfs -m reflink=1 /tmp/xfs.img
          sudo mkdir -p /mnt/devflow-xfs
          sudo mount -o loop /tmp/xfs.img /mnt/devflow-xfs
          sudo chown -R $(whoami):$(whoami) /mnt/devflow-xfs

      - name: Redirect devflow data to XFS
        run: |
          mkdir -p ~/.local/share
          ln -sf /mnt/devflow-xfs ~/.local/share/devflow

      - name: Pull postgres image
        run: docker pull postgres:17

      - name: Run integration tests
        env:
          EXPECTED_STORAGE: reflink
          DEVFLOW_BIN: ${{ github.workspace }}/target/debug/devflow
        run: ./scripts/integration-test.sh

  integration-linux-btrfs:
    name: Integration (Linux / Btrfs reflink)
    needs: build-and-test
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: -C link-arg=-fuse-ld=mold
    steps:
      - uses: actions/checkout@v4

      - name: Install mold linker
        run: sudo apt-get install -y mold

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build

      - name: Set up Btrfs
        run: |
          sudo apt-get update
          sudo apt-get install -y btrfs-progs
          sudo truncate -s 2G /tmp/btrfs.img
          sudo mkfs.btrfs /tmp/btrfs.img
          sudo mkdir -p /mnt/devflow-btrfs
          sudo mount -o loop /tmp/btrfs.img /mnt/devflow-btrfs
          sudo chown -R $(whoami):$(whoami) /mnt/devflow-btrfs

      - name: Redirect devflow data to Btrfs
        run: |
          mkdir -p ~/.local/share
          ln -sf /mnt/devflow-btrfs ~/.local/share/devflow

      - name: Pull postgres image
        run: docker pull postgres:17

      - name: Run integration tests
        env:
          EXPECTED_STORAGE: reflink
          DEVFLOW_BIN: ${{ github.workspace }}/target/debug/devflow
        run: ./scripts/integration-test.sh

  release:
    name: Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - integration-linux-zfs
      - integration-linux-xfs
      - integration-linux-btrfs
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: devflow-linux-amd64
          - os: macos-latest
            artifact_name: devflow-macos-arm64
    steps:
      - uses: actions/checkout@v4

      - name: Install mold linker (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y mold

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release
        env:
          RUSTFLAGS: ${{ runner.os == 'Linux' && '-C link-arg=-fuse-ld=mold' || '' }}

      - name: Smoke test release binary
        run: |
          ./target/release/devflow --version
          ./target/release/devflow --help > /dev/null

      - name: Package binary
        run: |
          mkdir -p dist
          cp target/release/devflow dist/${{ matrix.artifact_name }}
          chmod +x dist/${{ matrix.artifact_name }}

      - name: Generate SHA256 checksums
        run: |
          cd dist
          if command -v sha256sum &>/dev/null; then
            sha256sum ${{ matrix.artifact_name }} > ${{ matrix.artifact_name }}.sha256
          else
            shasum -a 256 ${{ matrix.artifact_name }} > ${{ matrix.artifact_name }}.sha256
          fi
          cat ${{ matrix.artifact_name }}.sha256

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/${{ matrix.artifact_name }}
            dist/${{ matrix.artifact_name }}.sha256
          generate_release_notes: true
