[tools]
cargo = "latest"
rust = "latest"

[tasks.docs]
description = "Serve documentation site locally"
run = "open http://localhost:8787 & python3 -m http.server 8787 -d docs"

[tasks.build]
description = "Build the project (debug)"
run = "cargo build"

[tasks."build:release"]
description = "Build the project (release, optimized)"
run = "cargo build --release"

[tasks.test]
description = "Run all tests"
run = "cargo test"

[tasks.check]
description = "Run cargo check (fast compile check)"
run = "cargo check"

[tasks.lint]
description = "Run clippy lints"
run = "cargo clippy -- -D warnings"

[tasks.fmt]
description = "Format code"
run = "cargo fmt"

[tasks."fmt:check"]
description = "Check code formatting without modifying"
run = "cargo fmt -- --check"

[tasks.dev]
description = "Build and run devflow (debug)"
run = "cargo run --"
raw = true

[tasks.clean]
description = "Clean build artifacts"
run = "cargo clean"

[tasks."generate-llms"]
description = "Generate llms.txt and llms-full.txt from source"
depends = ["build"]
run = "./scripts/generate-llms-txt.sh"

[tasks."generate-llms:check"]
description = "Verify llms.txt files are up to date"
depends = ["build"]
run = "./scripts/generate-llms-txt.sh --check"

[tasks.ci]
description = "Run full CI pipeline (fmt check + clippy + test)"
run = """
cargo fmt -- --check
cargo clippy -- -D warnings
cargo test
"""
