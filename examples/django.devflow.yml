# Django devflow configuration
# PostgreSQL service with Django-specific lifecycle hooks.

git:
  auto_create_on_workspace: true
  auto_switch_on_workspace: true
  main_workspace: main
  exclude_workspaces:
    - main
    - master
    - develop

behavior:
  auto_cleanup: true
  max_workspaces: 5
  naming_strategy: prefix

services:
  - name: app-db
    type: local
    service_type: postgres
    auto_workspace: true
    default: true
    local:
      image: postgres:17

hooks:
  post-create:
    update-env:
      command: "echo DATABASE_URL={{ service['app-db'].url }} > .env.local"
      working_dir: "."
    migrate:
      command: "python manage.py migrate"
      working_dir: "."
    restart-services:
      command: "docker compose restart"
      working_dir: "."
  post-switch:
    update-env:
      command: "echo DATABASE_URL={{ service['app-db'].url }} > .env.local"
      working_dir: "."
    restart-services:
      command: "docker compose restart"
      working_dir: "."
