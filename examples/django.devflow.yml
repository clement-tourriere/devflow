# Django devflow configuration
# PostgreSQL backend with Django-specific lifecycle hooks.

git:
  auto_create_on_branch: true
  auto_switch_on_branch: true
  main_branch: main
  exclude_branches:
    - main
    - master
    - develop

behavior:
  auto_cleanup: true
  max_branches: 5
  naming_strategy: prefix

backends:
  - name: app-db
    type: local
    service_type: postgres
    auto_branch: true
    default: true
    local:
      image: postgres:17

hooks:
  post-create:
    update-env:
      command: "echo DATABASE_URL={{ service['app-db'].url }} > .env.local"
      working_dir: "."
    migrate:
      command: "python manage.py migrate"
      working_dir: "."
    restart-services:
      command: "docker compose restart"
      working_dir: "."
  post-switch:
    update-env:
      command: "echo DATABASE_URL={{ service['app-db'].url }} > .env.local"
      working_dir: "."
    restart-services:
      command: "docker compose restart"
      working_dir: "."
