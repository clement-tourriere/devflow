# Django devflow configuration
# PostgreSQL backend with Django-specific post-commands.

git:
  auto_create_on_branch: true
  auto_switch_on_branch: true
  main_branch: main
  exclude_branches:
    - main
    - master
    - develop

behavior:
  auto_cleanup: true
  max_branches: 5
  naming_strategy: prefix

backend:
  type: local
  service_type: postgres
  local:
    image: postgres:17

post_commands:
  - action: replace
    name: Update Django database configuration (.env.local)
    file: .env.local
    pattern: "DATABASE_URL=.*"
    replacement: "DATABASE_URL=postgresql://{db_user}@{db_host}:{db_port}/{db_name}"
    create_if_missing: true
    condition: "file_exists:manage.py"

  - name: Run Django migrations
    command: "python manage.py migrate"
    condition: "file_exists:manage.py"
    continue_on_error: false
    environment:
      DATABASE_URL: "postgresql://{db_user}@{db_host}:{db_port}/{db_name}"

  - name: Restart Docker Compose services
    command: "docker compose restart"
    continue_on_error: true
