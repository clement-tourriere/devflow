# Simple devflow configuration
# This example shows a minimal setup with a single local PostgreSQL backend.
# All sections are optional — even an empty file is valid.

git:
  auto_create_on_branch: true
  auto_switch_on_branch: true
  main_branch: main
  exclude_branches:
    - main
    - master

behavior:
  auto_cleanup: false
  max_branches: 10
  naming_strategy: prefix

# Single backend using modern backends array syntax
backends:
  - name: app-db
    type: local
    service_type: postgres
    auto_branch: true
    default: true
    local:
      image: postgres:17

# Update .env after branch creation/switch
hooks:
  post-create:
    update-env:
      command: "echo DATABASE_URL={{ service['app-db'].url }} > .env.local"
      working_dir: "."
    notify:
      command: "echo 'Service environment ready for branch {{ branch }}!'"
  post-switch:
    update-env:
      command: "echo DATABASE_URL={{ service['app-db'].url }} > .env.local"
      working_dir: "."
